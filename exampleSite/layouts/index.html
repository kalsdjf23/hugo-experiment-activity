<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }}</title>
    <style>
      body {
        margin: 0;
        padding: 2rem 1rem 4rem;
        background: #f3f4f6;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 72rem;
        margin: 0 auto;
      }

      h1,
      h2 {
        margin-top: 0;
      }

      .demo-links {
        margin-top: 1.5rem;
      }

      .demo-links a {
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>{{ .Title }}</h1>
      {{ .Content }}

      {{ partial "hugo-experiment-activity/activity.html" (dict "page" . "section" "experiments") }}

      <div class="demo-links">
        <p><a href="/shortcode-demo/">Open the shortcode example</a></p>
        <p><a href="/no-activity/">Open the empty-state example</a></p>
      </div>
    </main>
  </body>
</html>
